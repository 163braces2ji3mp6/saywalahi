<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saywallahi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <script src="walahi.js"></script>
    <link rel="icon" href="163.ico" type="image/x-icon">
</head>
<body class="bg-gray-400 flex items-center justify-center min-h-screen font-sans select-none">
    <div id="" class="bg-white p-6 rounded-xl shadow-lg border border-gray-100">
        <!-- game top-->
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-xl font-bold text-gray-800">SWEEP</h1>
            <div id="status" class="text-red-500 font-bold font-mono text-lg">🚩10</div>
            <button onclick="init()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded transition-colors text-sm font-bold">
                重設
            </button>
        </div>
        <!-- gameArea-->
        <div id="board" class="grid grid-cols-10 bg-gray-400 border border-gray-400 gap-[1px]"></div>
        <!-- info-->
        <div id="msg" class="mt-4 text-center font-bold h-6 text-gray-800"></div>
        <!-- title-->
        <div></div>
        <!-- gameState-->
        <div></div>
        <script>
        const SIZE = 10, MINES = 15;
        let board = [], flags = 0 ,gameOver = false, firstClick = true;
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');
        const msgElement = document.getElementById('msg');
                
        const colors = ['',
                        'text-blue-600',
                        'text-green-600',
                        'text-red-600',
                        'text-purple-600',
                        'text-red-900',
                        'text-teal-600',
                        'black',
                        'text-gray-600']
        
        function placeMine(firstR,firstC){
            let count = 0;
            while(count < MINES){
                let r = Math.floor(Math.random()*SIZE);
                let c = Math.floor(Math.random()*SIZE);
                if (!board[r][c].mine && (Math.abs(r - firstR) > 1 || Math.abs(c - firstC) > 1)) {
                    board[r][c].mine = true;
                    count++;
                }
            }
        }
        
        function toggleFlag(r,c,cell){
            if(!firstClick){
                if (gameOver || board[r][c].rev) return;

                board[r][c].flag = !board[r][c].flag;
                cell.innerText = board[r][c].flag ? '🚩':' ';
                flags += board[r][c].flag ? 1:-1;
                statusElement.innerHTML = `🚩 ${MINES - flags}`;
            }
        }

        function getMines(r,c){
            let  count = 0;
            for(let i=-1;i<=1;i++){
                for(let j=-1;j<=1;j++){
                let nr = r + i;
                let nc = c + j;
                // 使用可選鏈運算子檢查邊界並統計地雷
                if (board[nr]?.[nc]?.mine) count++;
                }
            }
            return count;
        }

        function checkWin(){
            let unrev = 0;
            for (let r=0;r<SIZE;r++)
                for(let c=0;c<SIZE;c++)
                    if(!board[r][c].rev)unrev++;
            if (unrev === MINES && !gameOver){
                msgElement.innerText = 'SYBAU NIGGER👀👀👀👀👀👀👀👀👀'
                msgElement.className = 'mt-4 text-center font-bold text-green-600 h-6';
                gameOver=true;
            }
        }
        
        function clickCell(r,c,cell){
            if (gameOver || board[r][c].flag || board[r][c].rev) return;

            if (firstClick){
                placeMine(r,c);
                firstClick = false;
            } 
            
            board[r][c].rev = true;
            cell.classList.replace('bg-gray-200','bg-white');
            cell.classList.remove('hover:bg-gray-300');

            //when fucked
            if(board[r][c].mine){
                cell.innerText='💣';
                cell.classList.add('bg-red-500');
                msgElement.innerText = ('YOU FUCKED UP BITCH💥')
                msgElement.className = ('mt-4 text-center font-bold text-red-600 h-6')
                gameOver = true;
                return;
            }

            //count mines
            let mines = getMines(r,c);
            console.log(`周圍有${mines}個地雷`);
            if (mines > 0){
                cell.innerText = mines;
                cell.classList.add(colors[mines]);
            } else {
                for(let i=-1;i<=1;i++){
                    for(let j=-1;j<=1;j++){
                        let nr=r+i;
                        let nc=c+j;
                        if(board[nr]?.[nc] && !board[nr][nc].rev){
                            clickCell(nr,nc,boardElement.children[nr * SIZE + nc]);
                        }
                    }
                }
            }
            checkWin();
        }
        
        function init(){
            boardElement.innerHTML = '';
            board =Array.from({length: SIZE}, 
                            ()=>Array.from({length:SIZE}, 
                            ()=> ({mine:false,rev:false,flag:false}))
            )
            flags = 0;
            gameOver = false;
            firstClick = true;
            statusElement.innerText = `🚩 ${MINES}`;
            msgElement.innerText = '';
            for(let r=0;r<SIZE;r++){
                for(let c=0;c<SIZE;c++){
                    const cell = document.createElement('div');
                    cell.className = 'w-8 h-8 sm:w-10 sm:h-10 bg-gray-200 hover:bg-gray-300 flex items-center justify-center font-bold text-lg cursor-pointer transition-colors';
                    cell.oncontextmenu = (e) => {
                        e.preventDefault();
                        //rightClick put flag
                        toggleFlag(r,c,cell);
                    };
                    cell.onclick = () => clickCell(r,c,cell); //sweep
                    boardElement.appendChild(cell);
                }
            }
        }
        init()
        </script>
    </div>
</body>
</html>
